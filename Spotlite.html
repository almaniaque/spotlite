<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="600px.css">
    <link rel="stylesheet" href="768px.css">
    <link rel="stylesheet" href="992px.css">
    <link rel="stylesheet" href="992px+.css">

    <title>spotlite</title>
</head>

<body>



    <main class="Principale">
        <header class="head">

            <section class="SHL">

                <header>
                    <button type="submit" id="arriere">
                        <i class="fa-solid fa-circle-arrow-left"></i>
                    </button>
                    <button type="submit" id="play">
                        <i class="fa-solid fa-circle-play"></i>
                    </button>
                    <button type="submit" id="avant">
                        <i class="fa-solid fa-circle-arrow-right"></i>
                    </button>
                </header>
                <footer>

                    <button type="submit" id="moins">
                        <i class="fa-solid fa-volume-low"></i></button>
                    <input type="range" name="" id="vrange" min="0" max="100" value="50">
                    <button type="submit" id="plus">
                        <i class="fa-solid fa-volume-high"></i></button>
                </footer>

            </section>
            <article>
                <section class="SHC">
                    <p id="artiste">Nom artiste</p>
                    <p id="titre">Titre de la chanson</p>
                    <input type="range" id="piste" min="0" max="100" value="0">
                </section>

                <section class="SHR">
                    <button>
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input placeholder="recherche" type="search" name="recherche" id="search">
                    </button>
                </section>
            </article>


    </main>

    <script type="text/javascript" src="script2.js"></script>
</body>

</html>
